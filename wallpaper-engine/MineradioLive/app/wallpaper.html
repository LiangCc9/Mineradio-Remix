<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Desktop Fusion</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent!important;pointer-events:none}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  </style>
</head>
<body>
  <canvas id="wall" aria-hidden="true"></canvas>
  <script>
    'use strict';
    var canvas = document.getElementById('wall');
    var ctx = canvas.getContext('2d', { alpha:true, desynchronized:true });
    var viewW = 1, viewH = 1, dpr = 1;
    var state = {
      enabled:false,
      cover:'',
      playing:false,
      opacity:1,
      particleMode:'full',
      colors:{primary:'#d6f8ff',secondary:'#9cffdf',highlight:'#fff0b8',glow:'#9cffdf'},
      motion:{beatPulse:0,bass:0,beatGlow:0,highBloom:0},
      visual:{intensity:.85,point:1,speed:1,scatter:0}
    };
    var smoothMotion = { beatPulse:0,bass:0,beatGlow:0,highBloom:0 };
    var ambientParticles = [];
    var coverParticles = [];
    var coverImg = null;
    var coverSrc = '';
    var coverBornAt = 0;
    var framePending = false;

    function clamp(value, min, max){
      value = Number(value);
      return Math.max(min, Math.min(max, isFinite(value) ? value : min));
    }
    function rand(seed){ return Math.abs(Math.sin(seed * 3187.917) * 43758.5453) % 1; }
    function normalizeMode(value){
      value = String(value || '').toLowerCase();
      return /^(full|ambient|off)$/.test(value) ? value : 'full';
    }
    function hexToRgb(hex, fallback){
      hex = String(hex || fallback || '#9cffdf').trim();
      if (/^#[0-9a-f]{3}$/i.test(hex)) hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
      if (!/^#[0-9a-f]{6}$/i.test(hex)) hex = fallback || '#9cffdf';
      return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
    }
    function rgba(hex, alpha){
      var c = hexToRgb(hex);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha + ')';
    }
    function ensureAmbientParticles(){
      var target = Math.min(720, Math.max(260, Math.round((viewW * viewH) / 5000)));
      while (ambientParticles.length < target) {
        var i = ambientParticles.length + 1;
        ambientParticles.push({
          seed:i * 11.37,
          x:rand(i * 1.3),
          y:rand(i * 2.7),
          lane:rand(i * 5.9),
          depth:rand(i * 8.1),
          size:.45 + rand(i * 4.2) * 2.1
        });
      }
      if (ambientParticles.length > target + 60) ambientParticles.length = target;
    }
    function resize(){
      viewW = Math.max(1, innerWidth);
      viewH = Math.max(1, innerHeight);
      dpr = Math.min(1.25, Math.max(1, window.devicePixelRatio || 1));
      canvas.width = Math.floor(viewW * dpr);
      canvas.height = Math.floor(viewH * dpr);
      canvas.style.width = viewW + 'px';
      canvas.style.height = viewH + 'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ensureAmbientParticles();
    }
    function rebuildCoverParticles(){
      coverParticles = [];
      if (!coverImg) return;
      var sampleSize = 86;
      var sample = document.createElement('canvas');
      sample.width = sample.height = sampleSize;
      var sctx = sample.getContext('2d', { willReadFrequently:true });
      var sw = coverImg.naturalWidth || coverImg.width || 1;
      var sh = coverImg.naturalHeight || coverImg.height || 1;
      var crop = Math.min(sw, sh);
      try {
        sctx.drawImage(coverImg, (sw - crop) * .5, (sh - crop) * .5, crop, crop, 0, 0, sampleSize, sampleSize);
        var pixels = sctx.getImageData(0,0,sampleSize,sampleSize).data;
        for (var y=1;y<sampleSize;y+=2) {
          for (var x=1;x<sampleSize;x+=2) {
            var idx = (y * sampleSize + x) * 4;
            var alpha = pixels[idx + 3];
            if (alpha < 24) continue;
            var seed = (y * sampleSize + x) * 0.731;
            coverParticles.push({
              tx:(x / (sampleSize - 1) - .5),
              ty:(y / (sampleSize - 1) - .5),
              sx:(rand(seed * 1.7) - .5) * 1.8,
              sy:(rand(seed * 2.3) - .5) * 1.5,
              z:rand(seed * 3.1),
              seed:seed,
              r:Math.min(255, pixels[idx] + 18),
              g:Math.min(255, pixels[idx + 1] + 18),
              b:Math.min(255, pixels[idx + 2] + 18),
              a:alpha / 255
            });
          }
        }
      } catch (error) {
        coverParticles = [];
      }
      coverBornAt = performance.now();
    }
    function setCover(src){
      src = String(src || '');
      if (src === coverSrc) return;
      coverSrc = src;
      coverImg = null;
      coverParticles = [];
      if (!src) return;
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function(){
        if (coverSrc !== src) return;
        coverImg = img;
        rebuildCoverParticles();
      };
      img.onerror = function(){ if (coverSrc === src) { coverImg = null; coverParticles = []; } };
      img.src = src;
    }
    function applyState(next){
      next = next || {};
      state = Object.assign({}, state, next);
      state.colors = Object.assign({}, state.colors, next.colors || {});
      state.motion = Object.assign({}, state.motion, next.motion || {});
      state.visual = Object.assign({}, state.visual, next.visual || {});
      state.particleMode = normalizeMode(state.particleMode);
      setCover(state.cover || '');
      if (state.particleMode === 'off' || !state.enabled) clearCanvas();
      requestFrame();
    }
    function clearCanvas(){
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,viewW,viewH);
    }
    function updateMotion(){
      ['beatPulse','bass','beatGlow','highBloom'].forEach(function(key){
        var target = clamp(state.motion[key], 0, 1.8);
        var ease = target > smoothMotion[key] ? .08 : .035;
        smoothMotion[key] += (target - smoothMotion[key]) * ease;
      });
    }
    function drawAmbient(now, opacity){
      ensureAmbientParticles();
      var primary = state.colors.primary || '#d6f8ff';
      var secondary = state.colors.secondary || '#9cffdf';
      var highlight = state.colors.highlight || '#fff0b8';
      var glow = state.colors.glow || secondary;
      var speedScale = clamp(state.visual.speed, .2, 2.5) * (state.playing ? 1 : .34);
      var intensity = clamp(state.visual.intensity, .2, 1.6);
      var cx = viewW * .54;
      var cy = viewH * .53 + Math.sin(now * .22) * viewH * .018;
      var rx = viewW * .50;
      var ry = viewH * .36;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var i=0;i<ambientParticles.length;i++) {
        var p = ambientParticles[i];
        var speed = (.006 + rand(p.seed) * .017) * speedScale;
        var angle = p.x * Math.PI * 2 + now * speed + Math.sin(now * .07 + p.seed) * .18;
        var ring = .12 + p.depth * .95;
        var wave = Math.sin(now * (.18 + rand(p.seed) * .22) + p.seed) * (9 + 20 * p.depth);
        var x = cx + Math.cos(angle) * rx * ring + Math.sin(now * .10 + p.seed) * 22;
        var y = cy + Math.sin(angle * (1 + rand(p.seed * 2) * .14)) * ry * ring + wave;
        var twinkle = Math.pow(.5 + .5 * Math.sin(now * (.42 + rand(p.seed) * .50) + p.seed), 5);
        var beatLift = 1 + smoothMotion.beatPulse * (.04 + p.depth * .07);
        var radius = Math.max(.55, p.size * (.68 + twinkle * 1.25) * beatLift * clamp(state.visual.point, .5, 2.2));
        ctx.globalAlpha = (.045 + twinkle * .22 + smoothMotion.beatGlow * .008) * opacity * intensity;
        ctx.fillStyle = twinkle > .76 ? highlight : (p.lane > .58 ? secondary : (p.lane > .28 ? glow : primary));
        ctx.beginPath();
        ctx.arc(x,y,radius,0,Math.PI*2);
        ctx.fill();
      }
      var aura = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(viewW,viewH)*.58);
      aura.addColorStop(0, rgba(highlight, (.028 + smoothMotion.highBloom * .020) * opacity));
      aura.addColorStop(.38, rgba(secondary, (.020 + smoothMotion.bass * .014) * opacity));
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = aura;
      ctx.fillRect(0,0,viewW,viewH);
      ctx.restore();
    }
    function drawCoverParticles(now, nowMs, opacity){
      if (!coverParticles.length) return;
      var age = Math.max(0, nowMs - coverBornAt) / 1000;
      var gather = 1 - Math.exp(-age * 4.2);
      var smoothGather = gather * gather * (3 - 2 * gather);
      var side = Math.min(viewW,viewH) * (.58 + smoothMotion.bass * .022 + smoothMotion.beatPulse * .018);
      var cx = viewW * .66 + Math.sin(now * .20) * 8;
      var cy = viewH * .48 + Math.cos(now * .24) * 7;
      var pointScale = clamp(state.visual.point, .5, 2.2);
      var scatter = clamp(state.visual.scatter, 0, .5);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var i=0;i<coverParticles.length;i++) {
        var p = coverParticles[i];
        var depth = (p.z - .5) * (10 + scatter * 90);
        var breathe = Math.sin(now * (.32 + p.z * .22) + p.seed) * (1.5 + smoothMotion.bass * 1.2);
        var targetX = p.tx * side + breathe + depth * .10;
        var targetY = p.ty * side + Math.cos(now * .27 + p.seed) * 1.6 - depth * .06;
        var startX = p.sx * side;
        var startY = p.sy * side;
        var x = cx + startX + (targetX - startX) * smoothGather;
        var y = cy + startY + (targetY - startY) * smoothGather;
        var pulse = 1 + smoothMotion.beatPulse * (.05 + p.z * .04) + smoothMotion.beatGlow * .015;
        var radius = (.62 + p.z * 1.05) * pointScale * pulse;
        ctx.globalAlpha = p.a * (.34 + p.z * .30) * opacity * smoothGather;
        ctx.fillStyle = 'rgb(' + p.r + ',' + p.g + ',' + p.b + ')';
        ctx.beginPath();
        ctx.arc(x,y,radius,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    function draw(nowMs){
      framePending = false;
      if (!state.enabled || state.particleMode === 'off') {
        clearCanvas();
        setTimeout(requestFrame, 240);
        return;
      }
      updateMotion();
      clearCanvas();
      var opacity = clamp(state.opacity, .05, 1);
      var now = nowMs * .001;
      drawAmbient(now, opacity);
      if (state.particleMode === 'full') drawCoverParticles(now, nowMs, opacity);
      requestFrame();
    }
    function requestFrame(){
      if (framePending) return;
      framePending = true;
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize();
    if (window.desktopOverlay && window.desktopOverlay.onWallpaperState) {
      window.desktopOverlay.onWallpaperState(applyState);
    }
    window.__mineradioWallpaperApplyState = applyState;
    requestFrame();
  </script>
</body>
</html>
